name: generated-code

on: pull_request

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Checkout submodules
      run: git submodule update --init --depth=0
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'go.mod'
        cache: true
    - name: go generate and diff checks
      # lambda_deprecated_runtime is excluded because its generator fetches
      # remote data from AWS docs, making it non-deterministic and dependent
      # on network access.
      run: |
        go generate $(go list ./... | grep -v lambda_deprecated_runtime)
        git diff --exit-code
